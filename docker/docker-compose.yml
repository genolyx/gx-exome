# gx-exome pipeline stack (this repo only).
# Portal / annotation API는 별도 genolyx/service-daemon 레포에서 실행합니다.

services:
  gx-exome:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: gx-exome:latest
    container_name: gx-exome
    ports:
      - "5000:5000"   # Dashboard (local analysis management)
    volumes:
      - ${DATA_DIR:-../data}/fastq:/data/fastq
      - ${DATA_DIR:-../data}/analysis:/data/analysis
      - ${DATA_DIR:-../data}/output:/data/output
      - ${DATA_DIR:-../data}/log:/data/log
      - ${REF_DIR:-../data/refs}:/app/references:ro
      - ${BED_DIR:-../data/bed}:/app/bed:ro
      - ${MODELS_DIR:-../models}:/app/models:ro
    environment:
      - BASE_DIR=/data
      - NXF_OPTS=-Xms1g -Xmx4g
    env_file:
      - ../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
